<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search · Roie Shalom</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://kit.fontawesome.com/3ff078e01b.js" crossorigin="anonymous"></script>
  <style>
    /* ============================================================
       CASE STUDY — Search
    ============================================================ */

    /* Full-bleed: escape body padding at every breakpoint */
    .cs-bleed {
      margin-left: calc(-1 * clamp(20px, 5vw, 32px));
      margin-right: calc(-1 * clamp(20px, 5vw, 32px));
    }
    @media (min-width: 600px) {
      .cs-bleed {
        margin-left: calc(-1 * clamp(32px, 8vw, 64px));
        margin-right: calc(-1 * clamp(32px, 8vw, 64px));
      }
    }
    @media (min-width: 1200px) {
      .cs-bleed {
        margin-left: calc(-1 * clamp(80px, 12vw, 200px));
        margin-right: calc(-1 * clamp(80px, 12vw, 200px));
      }
    }

    /* Re-adds padding inside full-bleed sections */
    .cs-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding-left: clamp(20px, 5vw, 32px);
      padding-right: clamp(20px, 5vw, 32px);
    }
    @media (min-width: 600px) {
      .cs-inner {
        padding-left: clamp(32px, 8vw, 64px);
        padding-right: clamp(32px, 8vw, 64px);
      }
    }
    @media (min-width: 1200px) {
      .cs-inner {
        padding-left: clamp(80px, 12vw, 200px);
        padding-right: clamp(80px, 12vw, 200px);
      }
    }

    /* Narrow text column */
    .cs-text {
      max-width: 660px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Section spacing */
    .cs-section {
      margin-top: 72px;
    }

    /* Eyebrow label */
    .cs-eyebrow {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--color-link);
      margin-bottom: 10px;
    }

    /* Section headings */
    .cs-h2 {
      font-size: clamp(1.2rem, 2.8vw, 1.65rem);
      font-weight: 700;
      color: var(--color-text-main);
      margin: 6px 0 18px;
      line-height: 1.3;
    }

    /* Body text */
    .cs-p {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--color-text-main);
      margin: 0 0 14px;
    }

    /* ---- HERO ---- */
    .cs-hero {
      position: relative;
      background: #1B2D45;
      padding: 96px 0 88px;
      margin-top: -8px;
      overflow: hidden;
    }

    .cs-hero .cs-inner {
      position: relative;
      z-index: 2;
    }

    .cs-hero-content {
      max-width: 700px;
    }

    .cs-hero-img-wrap {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 62%;
      overflow: hidden;
      pointer-events: none;
    }

    .cs-hero-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 0;
      opacity: 0.55;
    }

    .cs-hero-fade {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, #1B2D45 28%, rgba(27,45,69,0.7) 50%, rgba(27,45,69,0.1) 100%);
      z-index: 1;
    }

    .cs-hero-eyebrow {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.5);
      margin-bottom: 14px;
    }

    .cs-hero-h {
      display: block;
      font-size: clamp(1.5rem, 3.5vw, 2.4rem);
      font-weight: 700;
      line-height: 1.25;
      color: #fff;
      margin: 0 0 28px;
    }

    .cs-meta-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px 20px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.6);
    }

    .cs-meta-row strong {
      color: rgba(255,255,255,0.9);
      font-weight: 600;
    }

    @media (max-width: 600px) {
      .cs-hero-img-wrap {
        width: 100%;
        opacity: 0.4;
      }
      .cs-hero-fade {
        background: linear-gradient(to bottom, rgba(27,45,69,0.5) 0%, #1B2D45 65%);
      }
      .cs-hero {
        padding: 56px 0 52px;
      }
    }

    /* ---- ROLE BAR ---- */
    .cs-role-bar {
      background: var(--color-grey-light);
    }

    .cs-role-bar .cs-inner {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px 32px;
      padding-top: 32px;
      padding-bottom: 32px;
    }

    .cs-role-col-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-link);
      margin-bottom: 6px;
    }

    .cs-role-col-val {
      font-size: 0.875rem;
      color: var(--color-text-main);
      line-height: 1.55;
    }

    @media (max-width: 600px) {
      .cs-role-bar .cs-inner {
        grid-template-columns: 1fr;
        gap: 20px;
      }
    }

    /* ---- IMAGES ---- */
    .cs-img {
      width: 100%;
      display: block;
      border-radius: 12px;
    }

    .cs-img-wrap {
      margin: 32px 0 0;
    }

    .cs-img-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 32px 0 0;
      align-items: start;
    }

    .cs-img-2col figure {
      margin: 0;
    }

    .cs-img-2col .cs-img {
      height: 420px;
      object-fit: cover;
      border-radius: 12px;
    }

    @media (max-width: 600px) {
      .cs-img-2col {
        grid-template-columns: 1fr;
      }
      .cs-img-2col .cs-img {
        height: 280px;
      }
    }

    /* ---- CAPTION ---- */
    .cs-caption {
      font-size: 0.78rem;
      color: var(--color-text);
      font-style: italic;
      text-align: center;
      margin: 8px 0 0;
      line-height: 1.45;
    }

    /* ---- PULL QUOTE ---- */
    .cs-pullquote {
      border-left: 3px solid var(--color-link);
      padding: 10px 20px;
      margin: 28px 0;
      font-size: 1.02rem;
      font-style: italic;
      font-weight: 500;
      color: var(--color-text-main);
      line-height: 1.55;
    }

    /* ---- DECISION CARDS ---- */
    .cs-decision-card {
      background: var(--color-grey-light);
      border-radius: var(--radius-card);
      padding: 28px 32px 32px;
      margin-bottom: 0;
    }

    .cs-decision-num {
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--color-link);
      opacity: 0.35;
      line-height: 1;
      margin-bottom: 6px;
    }

    .cs-decision-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--color-text-main);
      margin: 0 0 12px;
    }

    .cs-decision-block {
      margin-bottom: 56px;
    }

    .cs-decision-block:last-child {
      margin-bottom: 0;
    }

    @media (max-width: 600px) {
      .cs-decision-card {
        padding: 20px 20px 24px;
      }
    }

    /* ---- IMPACT STRIP ---- */
    .cs-impact {
      background: #1B2D45;
      padding: 64px 0;
      margin-top: 72px;
    }

    html[data-theme="dark"] .cs-impact {
      background: #0d1a28;
    }

    .cs-impact .cs-inner {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      text-align: center;
    }

    .cs-impact-num {
      font-size: clamp(2rem, 4.5vw, 3rem);
      font-weight: 800;
      color: #F21783;
      line-height: 1;
      margin-bottom: 10px;
    }

    .cs-impact-label {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.65);
      line-height: 1.55;
    }

    .cs-impact-label strong {
      display: block;
      color: #fff;
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 0.88rem;
    }

    @media (max-width: 600px) {
      .cs-impact .cs-inner {
        grid-template-columns: 1fr;
        gap: 36px;
      }
    }

    /* ---- REFLECTION ---- */
    .cs-reflection {
      background: var(--color-grey-light);
      padding: 56px 0 64px;
      margin-top: 0;
    }

    /* ---- BACK LINK ---- */
    .cs-back-wrap {
      text-align: center;
      padding: 48px 0 72px;
    }

    .cs-back-link {
      color: var(--color-link);
      font-weight: 500;
      font-size: 0.95rem;
      text-decoration: none;
      display: inline-block;
      transition: transform 0.2s cubic-bezier(.37,1.13,.62,.96);
    }

    .cs-back-link:hover {
      transform: translateX(-3px);
    }
  </style>
</head>
<body>

    <button class="nav-menu-toggle" aria-label="Open menu" aria-expanded="false"><span class="nav-icon">☰</span></button>
    <div class="top-nav-links">

      <a href="about.html" class="nav-link">About</a>
      <a href="contact.html" class="nav-link">Contact</a>
    </div>
  </nav>

  <!-- PLACEHOLDER — content will be filled in -->
  <section class="cs-hero cs-bleed">
    <div class="cs-hero-img-wrap">
      <!-- hero image goes here -->
    </div>
    <div class="cs-inner">
      <div class="cs-hero-content">
        <span class="cs-hero-eyebrow">Product Story</span>
        <h1 class="cs-hero-h">Search</h1>
      </div>
    </div>
  </section>

  <div class="cs-back-wrap">
    <a href="work.html" class="cs-back-link">← Back to all projects</a>
  </div>

  <script src="access.js"></script>
  <script src="nav.js"></script>
  <script src="theme.js"></script>
  <script src="name-animator.js"></script>
</body>
</html>
