<!DOCTYPE html>
<html lang="en">
<head>
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "u4dp513xm1");
  </script>
  <meta charset="UTF-8">
  <title>Contact · Roie Shalom</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@100..900&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css?v=4">

</head>

<body>
  <nav class="top-nav">
    <a href="index.html" class="brand" id="desktop-brand">Roie Shalom</a>
    <button class="nav-menu-toggle" aria-label="Open menu" aria-expanded="false"><span class="nav-icon">☰</span></button>
    <div class="top-nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="work.html" class="nav-link">Work</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="contact.html" class="nav-link active">Contact</a>
    </div>
  </nav>
  <main class="main-content">
    <section class="section">
      <div class="section-title">Contact</div>
      <p>Looking to hire, collaborate, or just want to say hello? Fill in the form and I'll get back to you.</p>
      <form class="contact-form" id="contact-form">
        <div class="form-row">
          <label for="name">Your name</label>
          <input type="text" id="name" name="name" required placeholder="Jane Smith">
        </div>
        <div class="form-row">
          <label for="email">Your email</label>
          <input type="email" id="email" name="email" required placeholder="jane@example.com">
        </div>
        <div class="form-row">
          <label for="message">Message</label>
          <textarea id="message" name="message" required placeholder="What's on your mind?" rows="5"></textarea>
        </div>
        <button type="submit">Send message</button>
      </form>
      <p class="form-success" id="form-success" style="display:none;">Thanks! I'll be in touch soon.</p>
    </section>
  </main>
  <script>
    document.getElementById('contact-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const form = e.target;
      const data = new FormData(form);
      const res = await fetch('https://formspree.io/f/mkoqgrwg', {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });
      if (res.ok) {
        form.style.display = 'none';
        document.getElementById('form-success').style.display = 'block';
      }
    });
  </script>
  <script src="access.js"></script>
  <script src="nav.js"></script>
<script src="theme.js"></script>
<script src="name-animator.js"></script>
<footer>Hand coded with a dash of AI. HTML, CSS, JS. No templates.</footer>
</body>
