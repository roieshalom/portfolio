<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#f5f5f0"/>
  <!-- German flag stripe accent at top -->
  <rect x="0" y="0" width="600" height="8" fill="#1a1a1a"/>
  <rect x="0" y="8" width="600" height="8" fill="#dd0000"/>
  <rect x="0" y="16" width="600" height="8" fill="#ffce00"/>
  <!-- Card UI mockup -->
  <rect x="80" y="70" width="440" height="230" rx="12" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- Question number -->
  <text x="120" y="115" font-family="Arial, sans-serif" font-size="12" fill="#999" letter-spacing="1">FRAGE 42 VON 310</text>
  <!-- Question text -->
  <text x="120" y="150" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#222">Wie viele Bundesländer hat</text>
  <text x="120" y="172" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#222">Deutschland?</text>
  <!-- Answer options -->
  <rect x="110" y="192" width="360" height="36" rx="8" fill="#dd0000" opacity="0.08" stroke="#dd0000" stroke-width="1.5"/>
  <text x="130" y="215" font-family="Arial, sans-serif" font-size="14" fill="#dd0000" font-weight="bold">A  16</text>
  <rect x="110" y="237" width="360" height="36" rx="8" fill="#f5f5f0"/>
  <text x="130" y="260" font-family="Arial, sans-serif" font-size="14" fill="#555">B  12</text>
  <!-- Title -->
  <text x="300" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="1">Fragen Katalog</text>
  <text x="300" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888" letter-spacing="2">EINBÜRGERUNG TEST PREP</text>
</svg>
