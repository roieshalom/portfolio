<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#eef4fb"/>
  <!-- Stacked card shadow -->
  <rect x="115" y="88" width="370" height="220" rx="14" fill="#c9ddf0"/>
  <rect x="107" y="79" width="370" height="220" rx="14" fill="#ddeaf7"/>
  <!-- Main flashcard -->
  <rect x="100" y="70" width="400" height="220" rx="14" fill="#fff" stroke="#c5d8ee" stroke-width="1.5"/>
  <!-- German word -->
  <text x="300" y="165" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#1a3a5c">die Möglichkeit</text>
  <!-- Divider -->
  <line x1="160" y1="190" x2="440" y2="190" stroke="#e0ecf7" stroke-width="1.5"/>
  <!-- English translation -->
  <text x="300" y="225" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#5a8ab0" font-style="italic">the possibility</text>
  <!-- Progress dots -->
  <circle cx="270" cy="315" r="5" fill="#3b82f6"/>
  <circle cx="290" cy="315" r="5" fill="#3b82f6"/>
  <circle cx="310" cy="315" r="5" fill="#3b82f6" opacity="0.3"/>
  <circle cx="330" cy="315" r="5" fill="#3b82f6" opacity="0.3"/>
  <!-- Label -->
  <text x="300" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#888" letter-spacing="3">B1 WORTSCHATZ</text>
</svg>
