<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#2a1a4e"/>
      <stop offset="100%" stop-color="#0a0612"/>
    </radialGradient>
    <radialGradient id="ball" cx="38%" cy="33%" r="65%">
      <stop offset="0%" stop-color="#c4aaff"/>
      <stop offset="25%" stop-color="#7c3aed"/>
      <stop offset="65%" stop-color="#3b1a7e"/>
      <stop offset="100%" stop-color="#1a0a38"/>
    </radialGradient>
    <radialGradient id="mist" cx="50%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="baseGlow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#9b59f5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="55"  cy="35"  r="1.5" fill="#e0c97f" opacity="0.9"/>
  <circle cx="130" cy="22"  r="1"   fill="#fff"    opacity="0.6"/>
  <circle cx="195" cy="14"  r="1.5" fill="#e0c97f" opacity="0.7"/>
  <circle cx="285" cy="28"  r="1"   fill="#fff"    opacity="0.5"/>
  <circle cx="375" cy="18"  r="1.5" fill="#e0c97f" opacity="0.8"/>
  <circle cx="455" cy="38"  r="1"   fill="#fff"    opacity="0.6"/>
  <circle cx="525" cy="22"  r="2"   fill="#e0c97f" opacity="0.75"/>
  <circle cx="565" cy="55"  r="1"   fill="#fff"    opacity="0.5"/>
  <circle cx="38"  cy="115" r="1"   fill="#fff"    opacity="0.4"/>
  <circle cx="572" cy="100" r="1.5" fill="#e0c97f" opacity="0.5"/>
  <circle cx="75"  cy="210" r="1"   fill="#fff"    opacity="0.3"/>
  <circle cx="545" cy="195" r="1"   fill="#fff"    opacity="0.35"/>
  <circle cx="95"  cy="330" r="1"   fill="#e0c97f" opacity="0.4"/>
  <circle cx="515" cy="320" r="1.5" fill="#fff"    opacity="0.3"/>
  <circle cx="155" cy="370" r="1"   fill="#fff"    opacity="0.35"/>
  <circle cx="450" cy="375" r="1"   fill="#e0c97f" opacity="0.45"/>
  <circle cx="22"  cy="270" r="1"   fill="#e0c97f" opacity="0.3"/>
  <circle cx="580" cy="260" r="1"   fill="#fff"    opacity="0.3"/>

  <!-- Crescent moon -->
  <circle cx="498" cy="62" r="20" fill="#1a0a38"/>
  <circle cx="508" cy="55" r="16" fill="none" stroke="#e0c97f" stroke-width="1.5" opacity="0.35"/>

  <!-- Aura around ball -->
  <ellipse cx="300" cy="188" rx="128" ry="118" fill="url(#aura)" opacity="0.7"/>

  <!-- Crystal ball -->
  <circle cx="300" cy="182" r="98" fill="url(#ball)"/>
  <circle cx="300" cy="182" r="98" fill="url(#mist)"/>
  <!-- Main highlight -->
  <ellipse cx="265" cy="148" rx="32" ry="19" fill="#fff" opacity="0.11" transform="rotate(-25 265 148)"/>
  <!-- Small sparkle highlight -->
  <ellipse cx="308" cy="136" rx="11" ry="6" fill="#fff" opacity="0.07" transform="rotate(-15 308 136)"/>
  <!-- Ball rim -->
  <circle cx="300" cy="182" r="98" fill="none" stroke="#9b59f5" stroke-width="1.5" opacity="0.55"/>

  <!-- Glow under ball -->
  <ellipse cx="300" cy="292" rx="75" ry="12" fill="url(#baseGlow)" opacity="0.7"/>

  <!-- Base pillar -->
  <rect x="282" y="280" width="36" height="9"  rx="4.5" fill="#4c1d95" opacity="0.9"/>
  <rect x="261" y="287" width="78" height="5"  rx="2.5" fill="#4c1d95" opacity="0.65"/>

  <!-- Ask Esmeralda text -->
  <text x="300" y="348" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="31" font-weight="bold"
        fill="#e0c97f" letter-spacing="1.5" opacity="0.95">Ask Esmeralda</text>
</svg>
